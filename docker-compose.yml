services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:/data/shadow-cloud.db
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-secret}
      BOT_API_TOKEN: ${BOT_API_TOKEN:-replace-with-a-shared-api-token}
      SHADOW_CLOUD_SAVE_DIR: /data
      SHADOW_CLOUD_BOT_NOTIFY_BASE_URL: http://bot:3011
      SHADOW_CLOUD_BOT_NOTIFY_SECRET: ${SHADOW_CLOUD_BOT_NOTIFY_SECRET:-replace-with-a-shared-notify-secret}
      SHADOW_OVERRIDE_DISCORD_ROLE_ID: ${SHADOW_OVERRIDE_DISCORD_ROLE_ID:-your-shadow-role-id}
    ports:
      - "${SHADOW_CLOUD_API_PORT:-3001}:3001"
    volumes:
      - shadow-cloud-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/v1').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-secret}
      AUTH_URL: ${AUTH_URL:-https://shadow-cloud.example.com}
      AUTH_DISCORD_ID: ${AUTH_DISCORD_ID:-your-discord-oauth-client-id}
      AUTH_DISCORD_SECRET: ${AUTH_DISCORD_SECRET:-your-discord-oauth-client-secret}
      SHADOW_CLOUD_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${SHADOW_CLOUD_WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AUTH_URL: ${AUTH_URL:-https://shadow-cloud.example.com}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-your-discord-bot-token}
      SHADOW_CLOUD_API_URL: http://api:3001
      BOT_API_TOKEN: ${BOT_API_TOKEN:-replace-with-a-shared-api-token}
      SHADOW_CLOUD_BOT_NOTIFY_SECRET: ${SHADOW_CLOUD_BOT_NOTIFY_SECRET:-replace-with-a-shared-notify-secret}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3011/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  shadow-cloud-data:
