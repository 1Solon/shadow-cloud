services:
  api:
    restart: unless-stopped
    ports:
      - "${SHADOW_CLOUD_API_PORT:-3001}:3001"

  web:
    restart: unless-stopped
    environment:
      AUTH_URL: ${AUTH_URL:?Set AUTH_URL in the environment or .env}
    ports:
      - "${SHADOW_CLOUD_WEB_PORT:-3000}:3000"

  bot:
    restart: unless-stopped
    environment:
      AUTH_URL: ${AUTH_URL:?Set AUTH_URL in the environment or .env}
