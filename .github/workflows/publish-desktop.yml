name: Publish Desktop App

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-desktop-changes:
    name: Detect desktop changes
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.changes.outputs.should_publish }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for desktop-affecting changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_tag="${{ github.event.release.tag_name }}"
          previous_tag="$(git tag --sort=-creatordate | grep -vxF "$current_tag" | head -n 1 || true)"

          if [[ -z "$previous_tag" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$previous_tag" "$current_tag" -- \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            turbo.json \
            apps/desktop \
            packages \
            .github/workflows/publish-desktop.yml)"

          if [[ -n "$changed_files" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish-desktop:
    name: Build desktop app (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    needs: detect-desktop-changes
    if: needs.detect-desktop-changes.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js with pnpm cache
        if: github.ref_type != 'tag'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Node.js
        if: github.ref_type == 'tag'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || 'desktop-v__VERSION__' }}
          releaseName: ${{ github.event_name == 'release' && github.event.release.name || 'Shadow Cloud Local v__VERSION__' }}
          releaseBody: See the assets to download this desktop version.
          releaseDraft: ${{ github.event_name != 'release' }}
          prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || false }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          tauriScript: pnpm tauri
          args: --config src-tauri/tauri.release.conf.json ${{ matrix.args }}
