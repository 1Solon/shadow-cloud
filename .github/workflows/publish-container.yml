name: Publish Containers

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: bot
            dockerfile: apps/bot/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $packagePath = Join-Path $env:GITHUB_WORKSPACE "apps/${{ matrix.service }}/package.json"

          if (-not (Test-Path $packagePath)) {
            throw "Expected package manifest at '$packagePath'."
          }

          $package = Get-Content -Raw $packagePath | ConvertFrom-Json
          $version = [string]$package.version

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Expected a version field in '$packagePath'."
          }

          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          if ($version -notmatch '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$') {
            throw "Expected '$packagePath' version '$version' to be a valid container tag."
          }

          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Normalize registry namespace
        id: registry
        shell: pwsh
        run: |
          $owner = "${{ github.repository_owner }}".ToLowerInvariant()
          $repository = "${{ github.event.repository.name }}".ToLowerInvariant()
          "owner=$owner" >> $env:GITHUB_OUTPUT
          "repository=$repository" >> $env:GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner }}/${{ steps.registry.outputs.repository }}/${{ matrix.service }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
          labels: |
            org.opencontainers.image.title=shadow-cloud-${{ matrix.service }}
            org.opencontainers.image.description=Shadow Cloud ${{ matrix.service }} service
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false